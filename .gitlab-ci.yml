build-job:
  stage: build
  image: python:3.12
  script:
    - git submodule --init --recursive
    - pip install scons
    - scons platform=linux -j16

test-job1:
  stage: test
  script:
    - echo "This job tests something"
  
test-job2:
  stage: test
  script:
    - echo "This job tests something, but takes more time that test-job1."
    - echo "After the echo commands complete, it runs the sleep command for 20 seconds"
    - echo "which imulates a test that runs 20 seconds longer that test-job1"
    - sleep 20

deploy-prod:
  stage: deploy
  script:
    - echo "This job deploys something from the $CI_COMMIT_BRANCH branch."
  environment: production